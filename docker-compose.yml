version: '3.8'

services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      - MIJI_RUNTIME_MODE=${MIJI_RUNTIME_MODE:-local_full}
      - MIJI_LIGHTWEIGHT_MODE=${MIJI_LIGHTWEIGHT_MODE:-false}
      - MIJI_ENABLE_HEAVY_ALPHA=${MIJI_ENABLE_HEAVY_ALPHA:-true}
      - MIJI_ENABLE_HEAVY_REGIME=${MIJI_ENABLE_HEAVY_REGIME:-true}
      - MIJI_ENABLE_THEME_FORECAST=${MIJI_ENABLE_THEME_FORECAST:-true}
      - MIJI_ENABLE_LEAN=${MIJI_ENABLE_LEAN:-true}
      - MIJI_ENABLE_BACKGROUND_JOBS=${MIJI_ENABLE_BACKGROUND_JOBS:-true}
      - MIJI_ENABLE_FEATURE_STORE=${MIJI_ENABLE_FEATURE_STORE:-true}
      - MIJI_FEATURE_STORE_DIR=/app/backend/.cache/research_store
      - SQLITE_CACHE_PATH=/app/backend/.cache/market_cache.sqlite3
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://miji:miji@postgres:5432/miji
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - backend-cache:/app/backend/.cache
    depends_on:
      - redis
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - frontend-node-modules:/app/frontend/node_modules
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=miji
      - POSTGRES_USER=miji
      - POSTGRES_PASSWORD=miji
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  lean:
    image: quantconnect/lean:latest
    profiles: ["lean"]
    working_dir: /lean
    command: ["bash", "-lc", "lean --help || true"]
    volumes:
      - ./lean:/lean

  market-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-structure-platform
    environment:
      - STOCK_LIST=${STOCK_LIST:-600519,AAPL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=Asia/Shanghai
      
      # AI Model Configuration
      - ANSPIRE_API_KEYS=${ANSPIRE_API_KEYS}
      - AIHUBMIX_KEY=${AIHUBMIX_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Notification Channels
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - EMAIL_SENDER=${EMAIL_SENDER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - WECHAT_WEBHOOK_URL=${WECHAT_WEBHOOK_URL}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      
      # Data Providers
      - DATA_PROVIDER_PRIORITY=${DATA_PROVIDER_PRIORITY:-yfinance,akshare}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      
      # System
      - DEBUG=${DEBUG:-false}
      - DRY_RUN=${DRY_RUN:-false}
      
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./cache:/app/cache
      - ./results:/app/results
      
    restart: on-failure:3
    
    # For local testing - run once and stop
    # Remove this for production scheduling
    command: python market_structure/analysis_scheduler.py --stocks "${STOCK_LIST}" --notify
    
    healthcheck:
      test: ["CMD", "python", "-c", "from data_provider.base import DataProviderManager; DataProviderManager()"]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 30s

# Optional: Add Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: market-cache
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: always

# Optional: Add PostgreSQL for results storage
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: market-database
  #   environment:
  #     - POSTGRES_DB=market_analysis
  #     - POSTGRES_USER=analyzer
  #     - POSTGRES_PASSWORD=${DB_PASSWORD}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: always

volumes:
  backend-cache:
  frontend-node-modules:
  redis-data:
  postgres-data:

networks:
  default:
    name: market-network
